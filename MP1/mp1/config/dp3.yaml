defaults:
  - task: adroit_hammer

name: train_dp3_terminal_cond

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "dp3_terminal_cond"

horizon: 4
# horizon: 16
n_obs_steps: 2
n_action_steps: 3
# n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: True


# Terminal two-frame condition source. This does not use MP/MP1 policy code.
terminal_condition:
  # Set to 1 for stage1; set to 3 for stage3 training.
  stage: 1
  # Stage1 terminal-condition demonstrations: 20 demos, episode indices 20..39.
  stage1_episode_start: 20
  stage1_episode_end: 40
  # Stage3 terminal-condition demonstrations: only 10 selected from the above range.
  stage3_num_episodes: 10
  terminal_frame_count: 2
  terminal_selection: cycle

policy:
  _target_: mp1.policy.dp3_terminal_condition.DP3TerminalConditionPolicy
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  
  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  crop_shape:
  - 80
  - 80
  encoder_output_dim: 64
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: sample


  num_inference_steps: 10
  obs_as_global_cond: true
  shape_meta: ${shape_meta}

  # Standalone DP3 terminal-condition settings.
  # stage=1 uses 20 demos, episode indices [20, 40), as terminal two-frame data;
  # stage=3 uses only 10 episodes selected from that same range.
  terminal_frame_count: 2
  terminal_zarr_path: ${task.dataset.zarr_path}
  terminal_stage: ${terminal_condition.stage}
  terminal_stage1_episode_start: ${terminal_condition.stage1_episode_start}
  terminal_stage1_episode_end: ${terminal_condition.stage1_episode_end}
  terminal_stage3_num_episodes: ${terminal_condition.stage3_num_episodes}
  terminal_seed: ${training.seed}
  terminal_eval_mode: first

  use_pc_color: false
  pointnet_type: "pointnet"


  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm # layernorm, none
    normal_channel: false


ema:
  _target_: mp1.model.mean.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 3000
  gradient_accumulate_every: 1
  use_ema: True
  rollout_every: 200
  checkpoint_every: 200
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${training.seed}
  project: dp3
  resume: true
  tags:
  - dp3

checkpoint:
  save_ckpt: False # if True, save checkpoint every checkpoint_every
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True # this only saves when save_ckpt is True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}

# Override the original task dataset with a standalone DP3 dataset that adds
# batch["terminal_obs"] containing the final two frames. Existing task yaml files
# are not modified.
task:
  dataset:
    _target_: mp1.dataset.dp3_terminal_condition_dataset.DP3TerminalConditionDataset
    stage: ${terminal_condition.stage}
    stage1_episode_start: ${terminal_condition.stage1_episode_start}
    stage1_episode_end: ${terminal_condition.stage1_episode_end}
    stage3_num_episodes: ${terminal_condition.stage3_num_episodes}
    terminal_frame_count: ${terminal_condition.terminal_frame_count}
    terminal_selection: ${terminal_condition.terminal_selection}

