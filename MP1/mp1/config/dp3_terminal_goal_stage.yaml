defaults:
  - task: adroit_hammer

name: train_dp3_terminal_goal_stage

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "dp3_terminal_goal_stage"

horizon: 4
n_obs_steps: 2
n_action_steps: 3
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: True

# RoboTwin-style stages:
# stage=1: train DP3 plus terminal auxiliary losses on the first 20 demos.
# stage=2: run scripts/build_dp3_terminal_goal_bank.py to export prototypes.npy.
# stage=3: train DP3 on the first 10 demos with [z_curr, z_goal, z_goal-z_curr] appended to global_cond.
terminal_goal:
  stage: 1
  stage1_num_train_episodes: 20
  stage3_num_train_episodes: 10
  terminal_window: 8
  terminal_num_negatives: 4
  num_clusters: 4
  prototype_path: /data1/sjy/MP1/MP1/data/goal_bank/${task_name}/k_${terminal_goal.num_clusters}/prototypes.npy
  terminal_encoder_ckpt: null
  freeze_terminal_encoder: true
  goal_index: 0

policy:
  _target_: mp1.policy.dp3_terminal_goal.DP3TerminalGoalPolicy
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true

  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  crop_shape:
  - 80
  - 80
  encoder_output_dim: 64
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: sample

  num_inference_steps: 10
  obs_as_global_cond: true
  shape_meta: ${shape_meta}

  use_pc_color: false
  pointnet_type: "pointnet"

  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false

  terminal_aux:
    enabled: ${eval:'${terminal_goal.stage} == 1'}
    feat_dim: ${policy.encoder_output_dim}
    projection_dim: ${policy.encoder_output_dim}
    use_pc_color: ${policy.use_pc_color}
    temperature: 0.1
    lambda_nce: 1.0
    lambda_ttg: 0.3
    lambda_term: 0.1

  goal_conditioning:
    enabled: ${eval:'${terminal_goal.stage} == 3'}
    mode: concat
    projection_dim: ${policy.encoder_output_dim}
    prototype_path: ${terminal_goal.prototype_path}
    terminal_encoder_ckpt: ${terminal_goal.terminal_encoder_ckpt}
    freeze_terminal_encoder: ${terminal_goal.freeze_terminal_encoder}
    goal_index: ${terminal_goal.goal_index}

ema:
  _target_: mp1.model.mean.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 600
  gradient_accumulate_every: 1
  use_ema: True
  rollout_every: 200
  checkpoint_every: 200
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  short: null

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${training.seed}
  project: dp3
  resume: true
  tags:
  - dp3
  - terminal_goal_stage

checkpoint:
  save_ckpt: True
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: /data1/sjy/MP1/MP1/data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: /data1/sjy/MP1/MP1/data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: /data1/sjy/MP1/MP1/data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}

task:
  dataset:
    _target_: mp1.dataset.dp3_terminal_goal_dataset.DP3TerminalGoalDataset
    stage: ${terminal_goal.stage}
    stage1_num_train_episodes: ${terminal_goal.stage1_num_train_episodes}
    stage3_num_train_episodes: ${terminal_goal.stage3_num_train_episodes}
    return_terminal_samples: ${eval:'${terminal_goal.stage} == 1'}
    terminal_window: ${terminal_goal.terminal_window}
    terminal_num_negatives: ${terminal_goal.terminal_num_negatives}
    val_ratio: 0.0
    max_train_episodes: null
