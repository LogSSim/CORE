defaults:
  - task: adroit_hammer

name: train_mp_final_state_stage

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "mp_final_state_stage"

horizon: 4
n_obs_steps: 2
n_action_steps: 4
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: True

final_state:
  stage: 1
  stage1_num_train_episodes: 20
  stage3_num_train_episodes: 10
  feature_path: /data1/sjy/MP1/MP1/data/final_state_features/${task_name}_mp_stage2_final_state.npz
  num_clusters: 4
  stage1_checkpoint_path: null
  freeze_stage1_encoder: false
  # mean: train/infer both use mean final and cluster features from stage2.
  # episode: train uses per-episode features when the dataset provides them.
  final_condition_mode: mean

policy:
  _target_: mp1.policy.meanpolicy.Meanpolicy
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true

  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  crop_shape:
  - 84
  - 84
  encoder_output_dim: 64
  final_feature_dim: ${policy.encoder_output_dim}
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}
  obs_as_global_cond: true
  shape_meta: ${shape_meta}

  use_pc_color: false
  pointnet_type: "mlp"

  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false

  policy_stage: ${final_state.stage}
  final_state_feature_path: ${final_state.feature_path}
  final_condition_mode: ${final_state.final_condition_mode}
  stage1_checkpoint_path: ${final_state.stage1_checkpoint_path}
  freeze_stage1_encoder: ${final_state.freeze_stage1_encoder}

ema:
  _target_: mp1.model.mean.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 600
  gradient_accumulate_every: 1
  use_ema: True
  rollout_every: 200
  checkpoint_every: 200
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  max_grad_norm: 1.0
  ema_decay: 0.95
  short: null

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${exp_name}_${training.seed}
  project: mp
  resume: true
  tags:
  - mp
  - final_state_stage

checkpoint:
  save_ckpt: True
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: /data1/sjy/MP1/MP1/data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: /data1/sjy/MP1/MP1/data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: /data1/sjy/MP1/MP1/data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}

task:
  dataset:
    _target_: mp1.dataset.dp3_final_state_dataset.DP3FinalStateDataset
    stage: ${final_state.stage}
    stage1_num_train_episodes: ${final_state.stage1_num_train_episodes}
    stage3_num_train_episodes: ${final_state.stage3_num_train_episodes}
    final_state_feature_path: ${final_state.feature_path}
    val_ratio: 0.0
    max_train_episodes: null
